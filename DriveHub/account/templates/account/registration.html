{% extends 'main/base.html' %}
{% load static %}

{% block title %}Sign up{% endblock title %}

{% block content %}
    <section class="register-window">
        <div>
            <h3>Sign up</h3>
            <form action="{% url "account:registration" %}" method="post">
                {% csrf_token %}
                <div class="form-row">
                    <div class="register-item">
                        <label for="id_first_name" class="login-label">First name</label>
                        <input type="text" class="login-input" id="id_first_name"
                        value="{% if form.first_name.value %}{{ form.first_name.value }}{% endif %}"
                        name="first_name" placeholder="Your first name" required>
                    </div>
                    <div class="register-item">
                        <label for="id_last_name" class="login-label">Last name</label>
                        <input type="text" class="login-input" id="id_last_name"
                        value="{% if form.last_name.value %}{{ form.last_name.value }}{% endif %}"
                        name="last_name" placeholder="Your last name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="register-item">
                        <label for="id_username" class="login-label">Username</label>
                        <input type="text" class="login-input" id="id_username"
                        value="{% if form.username.value %}{{ form.username.value }}{% endif %}"
                        name="username" placeholder="Your username" required>
                    </div>
                    <div class="register-item">
                        <label for="id_email" class="login-label">Email</label>
                        <input type="email" class="login-input" id="id_email"
                        value="{% if form.email.value %}{{ form.email.value }}{% endif %}"
                        name="email" placeholder="Your email" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="register-item">
                        <label for="id_password1" class="login-label">Password</label>
                        <input type="password" class="login-input" id="id_password1"
                        value="{% if form.password1.value %}{{ form.password1.value }}{% endif %}"
                        name="password1" placeholder="Your password" required>
                    </div>
                    <div class="register-item">
                        <label for="id_phone" class="login-label">Phone</label>
                        <input type="text" class="login-input" id="id_phone"
                        value="{% if form.phone.value %}{{ form.phone.value }}{% endif %}"
                        name="phone" placeholder="Your phone" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="register-item">
                        <label for="id_password2" class="login-label">Confirm password</label>
                        <input type="password" class="login-input" id="id_password2"
                        value="{% if form.password2.value %}{{ form.password2.value }}{% endif %}"
                        name="password2" placeholder="Your password" required>
                    </div>
                    <div class="register-item"></div>
                </div>
                <button type="submit" class="register-btn">Create account</button>
            </form>
            <div class="register-btm">
                <a href="{% url "account:login" %}">Log in</a>
            </div>
        </div>
    </section>
{% endblock content %}
