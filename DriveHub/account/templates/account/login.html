{% extends "main/base.html" %}
{% load static %}

{% block title %}Login{% endblock title %}

{% block content %}
    <section class="login-window">
        <div>
            <h3>Login</h3>
            <form action="{% url "account:login" %}" method="post">
                {% csrf_token %}
                {% if request.GET.next %}
                    <input type="hidden" name="next" value="{{request.GET.next}}">
                {% endif %}
                <div class="login-item">
                    <label for="id_username" class='login-label'>Username</label>
                    <input type="text" class="login-input" value="{% if form.username.value %}{{ form.username.value }}{% endif %}"
                    name="username" id="id_username" placeholder="Your username" required>
                </div>
                <div class="login-item">
                    <label for="id_password" class='login-label'>Password</label>
                    <input type="password" class="login-input" name="password"
                    id="id_password" placeholder="Your password" required>
                </div>
                <button type="submit" class="login-btn">Log in</button>
            </form>
            <div class="login-btm">
                <a href="{% url "account:registration" %}">Sign up</a>
            </div>
        </div>
    </section>
{% endblock content %}
